name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build & test on three operating systems ──────────────────────────────
  build-test:
    name: Build & Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure

  # ── Static analysis (cppcheck) ───────────────────────────────────────────
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --error-exitcode=1 \
            --std=c11 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            src/

  # ── AddressSanitizer + UBSanitizer ───────────────────────────────────────
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with sanitizers
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          cmake --build build

      - name: Run tests
        run: ./build/test_game
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1

  # ── Valgrind memory check ────────────────────────────────────────────────
  valgrind:
    name: Valgrind Memory Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get install -y valgrind

      - name: Build (debug, no sanitizers)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug && cmake --build build

      - name: Run tests under valgrind
        run: |
          valgrind \
            --error-exitcode=1 \
            --leak-check=full \
            --track-origins=yes \
            ./build/test_game

  # ── Code coverage (gcov + lcov → Codecov) ────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Build with coverage instrumentation
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DTICTACTOE_COVERAGE=ON
          cmake --build build

      - name: Run tests
        run: ./build/test_game

      - name: Collect coverage data
        run: |
          lcov \
            --capture \
            --directory build \
            --output-file coverage.info \
            --rc branch_coverage=1
          lcov \
            --remove coverage.info \
              '/usr/*' \
              '*/tests/*' \
            --output-file coverage.info \
            --rc branch_coverage=1
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          flags: unittests
          name: tictactoe-c
          fail_ci_if_error: false   # non-blocking until Codecov token is configured
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── clang-format style check ──────────────────────────────────────────────
  format-check:
    name: clang-format Style Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          clang-format --version
          find src examples -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror --style=file
        continue-on-error: true   # informational — does not block merge
