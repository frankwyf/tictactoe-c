name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build & test on three operating systems ──────────────────────────────
  build-test:
    name: Build & Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure

  # ── Static analysis (cppcheck) ───────────────────────────────────────────
  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --error-exitcode=1 \
            --std=c11 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            src/

  # ── AddressSanitizer + UBSanitizer ───────────────────────────────────────
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with sanitizers
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          cmake --build build

      - name: Run tests
        run: ./build/test_game
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1

  # ── Valgrind memory check ────────────────────────────────────────────────
  valgrind:
    name: Valgrind Memory Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get install -y valgrind

      - name: Build (debug, no sanitizers)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug && cmake --build build

      - name: Run tests under valgrind
        run: |
          valgrind \
            --error-exitcode=1 \
            --leak-check=full \
            --track-origins=yes \
            ./build/test_game
