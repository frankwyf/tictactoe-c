name: Bug Report
description: Report a reproducible bug in tictactoe-c
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill in as much detail as possible to help us reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of tictactoe-c are you using?
      placeholder: "e.g., v1.0.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      multiple: false
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler & Version
      description: Output of `gcc --version` or equivalent
      placeholder: "e.g., gcc (GCC) 13.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Call `game_init(3, 3)`
        2. Call `game_make_move(...)` with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Logs, stack traces, or anything else that might help.
